<body>
 <a href="https://www.aidedd.org/dnd-filters/monsters.php" target="_blank">Bestiario 5e</a>


    <div class="container">
        <h1> Anotações dos NPCs</h1>
        
        <textarea id="texto" placeholder="Escreva suas anotações aqui..."></textarea>
        <div id="status" class="status"></div>
<script>
        // --- CARREGAR ANOTAÇÕES ---
        document.getElementById('texto').value = localStorage.getItem('anotacao3') || '';
        
        // --- SALVAR AUTOMATICAMENTE ---
        document.getElementById('texto').addEventListener('input', function() {
            localStorage.setItem('anotacao3', this.value);
            document.getElementById('status').textContent = 'Salvo!';
            setTimeout(() => {
                document.getElementById('status').textContent = '';
            }, 2000);
        });
</script>      
</body>
